<text x="860" y="215" class="pin-label" text-anchor="middle">COIL-</text>
<text x="980" y="170" class="pin-label" text-anchor="middle">COM</text>
<text x="980" y="215" class="pin-label" text-anchor="middle">NO</text>
<rect x="700" y="150" width="120" height="80" class="box"/>
<text x="760" y="195" class="comp-title" text-anchor="middle">PC817\A光耦隔离</text>
<text x="710" y="170" class="pin-label" text-anchor="middle">A(GPIO4)</text>
<text x="710" y="215" class="pin-label" text-anchor="middle">K(GND)</text>
<text x="810" y="195" class="pin-label" text-anchor="middle">C→Relay</text>
<rect x="850" y="300" width="140" height="80" class="box-relay"/>
<text x="920" y="345" class="comp-title" text-anchor="middle">座桶继电器\ASRD-12VDC</text>
<text x="860" y="320" class="pin-label" text-anchor="middle">COIL+</text>
<text x="860" y="365" class="pin-label" text-anchor="middle">COIL-</text>
<text x="980" y="320" class="pin-label" text-anchor="middle">COM</text>
<text x="980" y="365" class="pin-label" text-anchor="middle">NO→Pulse</text>
<rect x="700" y="300" width="120" height="80" class="box"/>
<text x="760" y="345" class="comp-title" text-anchor="middle">PC817\A光耦隔离</text>
<text x="710" y="320" class="pin-label" text-anchor="middle">A(GPIO5)</text>
<rect x="350" y="800" width="200" height="100" class="box"/>
<text x="450" y="855" class="comp-title" text-anchor="middle">MAX98357A\AI2S DAC + 功放</text>
<text x="360" y="825" class="pin-label" text-anchor="middle">VDD</text>
<text x="360" y="875" class="pin-label" text-anchor="middle">BCLK/WS/DIN</text>
<text x="540" y="855" class="pin-label" text-anchor="middle">OUT+/-→喇叭</text>
<rect x="350" y="950" width="200" height="60" class="box"/>
<text x="450" y="985" class="comp-title" text-anchor="middle">4Ω 3W 喇叭</text>
<rect x="600" y="800" width="150" height="60" class="box"/>
<text x="675" y="835" class="comp-title" text-anchor="middle">震动传感器\A（接原车报警信号）</text>
<rect x="600" y="950" width="150" height="60" class="box"/>
<text x="675" y="985" class="comp-title" text-anchor="middle">SIM7600 4G/GPS\A（预留UART2）</text>
<line x1="170" y1="130" x2="340" y2="130" class="wire-pwr"/>
<text x="340" y="125" class="net-label" text-anchor="middle">48V</text>
<line x1="170" y1="385" x2="340" y2="385" class="wire-pwr"/>
<text x="340" y="385" class="net-label" text-anchor="middle">12V</text>
<line x1="170" y1="495" x2="340" y2="495" class="wire-pwr"/>
<text x="480" y="495" class="net-label" text-anchor="middle">5V</text>
<line x1="170" y1="600" x2="340" y2="600" class="wire-pwr"/>
<text x="480" y="605" class="net-label" text-anchor="middle">3.3V</text>
<line x1="170" y1="750" x2="1000" y2="750" class="wire-gnd"/>
<text x="800" y="745" class="net-label" text-anchor="middle">GND</text>
<line x1="150" y1="130" x2="170" y2="130" class="wire-pwr"/>
<line x1="170" y1="215" x2="170" y2="130" class="wire-pwr"/>
<line x1="170" y1="290" x2="170" y2="215" class="wire-pwr"/>
<line x1="170" y1="385" x2="170" y2="290" class="wire-pwr"/>
<line x1="170" y1="385" x2="30" y2="495" class="wire-pwr"/>
<line x1="170" y1="495" x2="30" y2="600" class="wire-pwr"/>
<line x1="170" y1="605" x2="350" y2="285" class="wire-pwr"/>
<line x1="350" y1="360" x2="700" y2="170" class="wire-sig"/>
<line x1="820" y1="195" x2="850" y2="170" class="wire-sig"/>
<line x1="350" y1="390" x2="700" y2="320" class="wire-sig"/>
<line x1="550" y1="570" x2="350" y2="875" class="wire-sig"/>
<line x1="550" y1="855" x2="450" y2="980" class="wire-sig"/>
<line x1="600" y1="835" x2="350" y2="450" class="wire-sig"/>
<text x="30" y="1100" class="comp-title" text-anchor="start">连接说明：</text>
<text x="30" y="1125" class="label" text-anchor="start">1. 电源：48V电动车电池 → XT60 → 30A保险丝 → TVS浪涌保护 → MP2307(48V→12V) → LM2596(12V→5V) → AMS1117(5V→3.3V)</text>
<text x="30" y="1150" class="label" text-anchor="start">2. 门锁控制：ESP32 GPIO4 → PC817光耦 → 12V继电器 → 原车电门锁信号线（并联）</text>
<text x="30" y="1175" class="label" text-anchor="start">3. 座桶控制：ESP32 GPIO5 → PC817光耦 → 12V继电器（脉冲触发100ms） → 座桶锁电机</text>
<text x="30" y="1200" class="label" text-anchor="start">4. 震动报警：原车报警器信号 → GPIO12（下降沿中断） → 触发MAX98357A播放音效</text>
<text x="30" y="1225" class="label" text-anchor="start">5. 蓝牙：ESP32 BLE，UUID: 12345678-1234-1234-1234-123456789abc</text>
<text x="30" y="1250" class="label" text-anchor="start">6. 4G/GPS：预留UART2接口（GPIO41/RX2, GPIO42/TX2），可接SIM7600模块</text>
<text x="30" y="1275" class="label" text-anchor="start">7. 所有12V/48V信号均通过PC817光耦隔离，保护ESP32</text>
<text x="30" y="1300" class="label" text-anchor="start"></text>
<text x="30" y="1325" class="label" text-anchor="start">嘉立创下单：</text>
<text x="30" y="1350" class="label" text-anchor="start">- 将BOM嘉立创.csv导入嘉立创EDA，自动匹配元件</text>
<text x="30" y="1375" class="label" text-anchor="start">- PCB尺寸建议：80mm x 60mm，双面板，1.6mm厚度</text>
<text x="30" y="1400" class="label" text-anchor="start">- SMT贴片：选择BOM中所有贴片元件，省去手工焊接</text>
</svg>